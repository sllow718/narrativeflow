<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NarrativeFlow</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/pikachu.svg" />

    <!-- Description (shows in Google search results) -->
    <meta
      name="description"
      content="A workshop facilitation tool for data storytelling"
    />

    <!-- Open Graph (preview when shared on Slack, WhatsApp, LinkedIn etc.) -->
    <meta property="og:title" content="NarrativeFlow" />
    <meta
      property="og:description"
      content="A workshop facilitation tool for data storytelling"
    />
    <meta property="og:image" content="/pikachu.png" />

    <!-- Fonts (e.g. Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent search engines from indexing (useful during development) -->
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
